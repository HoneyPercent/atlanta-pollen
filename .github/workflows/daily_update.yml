name: Daily Pollen Update

on:
  schedule:
    # Multiple retry windows (weekdays only)
    - cron: '0 14 * * 1-5'   # 10am ET (UTC-4 summer)
    - cron: '0 17 * * 1-5'   # 1pm ET
    - cron: '0 20 * * 1-5'   # 4pm ET
  workflow_dispatch:           # Manual trigger for testing

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        run: python daily_pipeline.py
        env:
          TZ: America/New_York

      - name: Commit updated data
        run: |
          git config user.name "pollen-bot"
          git config user.email "pollen-bot@users.noreply.github.com"
          git add dashboard.json
          git diff --staged --quiet || git commit -m "data: update $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        run: git push
